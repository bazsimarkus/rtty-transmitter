<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 320" width="820" height="320" font-family="'Helvetica Neue', Helvetica, sans-serif">

  <!-- Background -->
  <rect width="820" height="320" fill="#ffffff" rx="10"/>

  <!-- Divider -->
  <line x1="405" y1="20" x2="405" y2="300" stroke="#d0ccc0" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ═══════════════════════════════════ -->
  <!--         LEFT: AMPLITUDE MODULATION  -->
  <!-- ═══════════════════════════════════ -->

  <!-- Title -->
  <text x="205" y="38" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e" letter-spacing="0.5">Amplitude Modulation</text>

  <!-- Axes -->
  <!-- X axis -->
  <line x1="40" y1="220" x2="380" y2="220" stroke="#333" stroke-width="1.8"/>
  <!-- Y axis -->
  <line x1="55" y1="70" x2="55" y2="225" stroke="#333" stroke-width="1.8"/>
  <!-- X axis arrow -->
  <polygon points="380,216 380,224 390,220" fill="#333"/>
  <!-- Y axis arrow -->
  <polygon points="51,70 59,70 55,60" fill="#333"/>

  <!-- Axis labels -->
  <text x="388" y="224" font-size="12" fill="#444" font-style="italic">f</text>
  <text x="320" y="238" font-size="11" fill="#555">Frequency →</text>
  <text transform="translate(35, 180) rotate(-90)" font-size="11" fill="#555">Magnitude →</text>

  <!-- Continuous Spectrum Curve (LSB, Carrier, and USB perfectly connected) -->
  <path id="am-spectrum-path" d="M 70,219
           C 77,219 86,215 94,205
           C 102,193 109,175 116,162
           C 123,153 129,148 135,148
           C 141,148 147,153 154,162
           C 161,175 168,193 176,205
           C 184,215 190,219 195,219
           C 200,219 205,170 210,120
           C 212,100 214,85 215,85
           C 216,85 218,100 220,120
           C 225,170 230,219 235,219
           C 240,219 246,215 254,205
           C 262,193 269,175 276,162
           C 283,153 289,148 295,148
           C 301,148 307,153 314,162
           C 321,175 328,193 336,205
           C 344,215 353,219 360,219"
        fill="#7ecec4" fill-opacity="0.5" stroke="#2a9d8f" stroke-width="1.8" stroke-linejoin="round"/>

