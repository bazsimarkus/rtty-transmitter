  <clipPath id="am-clip">
    <path d="M 70,219 C 77,219 86,215 94,205 C 102,193 109,175 116,162 C 123,153 129,148 135,148 C 141,148 147,153 154,162 C 161,175 168,193 176,205 C 184,215 190,219 195,219 C 200,219 205,170 210,120 C 212,100 214,85 215,85 C 216,85 218,100 220,120 C 225,170 230,219 235,219 C 240,219 246,215 254,205 C 262,193 269,175 276,162 C 283,153 289,148 295,148 C 301,148 307,153 314,162 C 321,175 328,193 336,205 C 344,215 353,219 360,219 Z"/>
  </clipPath>
  <g clip-path="url(#am-clip)">
    <!-- Iterate hatch lines every 10px from 75 to 355 -->
    <line x1="75" y1="80" x2="75" y2="220" stroke="#2a9d8f" stroke-width="0.8" opacity="0.6"/>
    <line x1="85" y1="80" x2="85" y2="220" stroke="#2a9d8f" stroke-width="0.8" opacity="0.6"/>
    <line x1="95" y1="80" x2="95" y2="220" stroke="#2a9d8f" stroke-width="0.8" opacity="0.6"/>
    <line x1="105" y1="80" x2="105" y2="220" stroke="#2a9d8f" stroke-width="0.8" opacity="0.6"/>
    <line x1="115" y1="80" x2="115" y2="220" stroke="#2a9d8f" stroke-width="0.8" opacity="0.6"/>
    <line x1="125" y1="80" x2="125" y2="220" stroke="#2a9d8f" stroke-width="0.8" opacity="0.6"/>
